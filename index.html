<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/ex_03.css" />
</head>
<body>
    <!-- 전체 로그인 박스 -->
    <div class="login-box">
      <!-- 로그인 텍스트 -->
      <p class="login-txt">Login</p>
      <!-- 입력폼 -->
      <div class="form">
        <!-- 이름 입력창 -->
        <div class="form-name">
          <p class="form-txt">Username</p>
          <input type="text" placeholder="Enter Username or Email" />
        </div>
        <!-- 비밀번호 입력창 -->
        <div class="form-pw">
          <p class="form-txt">Password</p>
          <input type="password" placeholder="Password" />
        </div>
      </div>
      <!-- 로그인 버튼 -->
      <button class="login-btn">Login</button>
      <!-- 비밀번호 찾기 버튼-->
      <button class="forgot-btn">Forgot password?</button>
      <!-- 가입하기 -->
      <div class="signup">
        <!-- 가입 텍스트 -->
        <p class="new-user">New User?</p>
        <!-- 가입 버튼 -->
        <button class="signup-btn">Signup Now</button>
      </div>
    </div>
</body>
</html>
